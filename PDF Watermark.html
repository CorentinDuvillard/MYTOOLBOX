<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Filigrane PDF</title>
<link rel="stylesheet" href="./theme.css">
<link rel="stylesheet" href="./tool.css">
<style>
  .work{display:grid;grid-template-columns:300px 1fr;gap:22px;margin-top:18px;align-items:start}
  @media (max-width:720px){.work{grid-template-columns:1fr}}
  .prevwrap{background:var(--surface-2);border:1px solid var(--line);border-radius:var(--radius);padding:16px;display:flex;justify-content:center}
  #preview{max-width:100%;box-shadow:var(--shadow-soft);background:#fff}
</style>
</head>
<body>
<div class="wrap">
  <header class="tool-head">
    <div class="tool-mark"><span class="glyph" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="m7 17 3-3 2 2 4-4"/></svg></span>Filigrane PDF</div>
    <span class="tag">Watermark</span>
  </header>
  <p class="sub">Apposez un filigrane texte sur toutes les pages d'un PDF : texte, taille, opacité, rotation, couleur, en diagonale ou en mosaïque. Aperçu et traitement locaux.</p>

  <div class="drop" id="drop" tabindex="0" role="button" aria-label="Choisir un PDF">
    <div class="bigicon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg></div>
    <h2>Glissez un PDF ici</h2><p>ou cliquez pour le sélectionner</p>
  </div>
  <input type="file" id="file" accept="application/pdf,.pdf" hidden>

  <div id="panel" hidden>
    <div class="work">
      <div class="grid">
        <div class="field"><label for="text">Texte</label><input type="text" id="text" value="CONFIDENTIEL" spellcheck="false"></div>
        <div class="field"><label for="mode">Disposition</label><select id="mode"><option value="diag">Diagonale (centre)</option><option value="tile">Mosaïque</option></select></div>
        <div class="row"><div class="field" style="flex:1"><label for="size">Taille</label><input type="number" id="size" value="48" min="8" max="200"></div><div class="field" style="flex:1"><label for="rot">Rotation°</label><input type="number" id="rot" value="45" min="-90" max="90"></div></div>
        <div class="field"><label for="opacity">Opacité — <span id="oval" class="mono">20</span>%</label><input type="range" id="opacity" min="5" max="100" value="20"></div>
        <div class="row"><div class="field"><label for="color">Couleur</label><input type="color" id="color" value="#e10b0b"></div></div>
        <button class="btn primary" id="apply">Appliquer et télécharger</button>
        <button class="btn ghost" id="reset">Autre PDF</button>
        <span class="summary" id="info"></span>
      </div>
      <div class="prevwrap"><canvas id="preview" aria-label="Aperçu de la première page"></canvas></div>
    </div>
  </div>
  <div class="toast" id="toast" role="status"></div>
  <footer class="foot"><span class="pt"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Traitement 100% local</span></footer>
</div>
<script>
(function () {
  "use strict";
  var $ = function (id) { return document.getElementById(id); };
  var SRC = { pdfjs: "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js", worker: "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js", pdflib: "https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js" };
  var loaded = {}, bytes = null, total = 0, baseImg = null, fileName = 'document';
  function load(src, glob, after) { if (window[glob]) return Promise.resolve(window[glob]); if (loaded[src]) return loaded[src]; loaded[src] = new Promise(function (res, rej) { var s = document.createElement('script'); s.src = src; s.onload = function () { if (after) after(); res(window[glob]); }; s.onerror = function () { loaded[src] = null; rej(new Error('Échec du chargement.')); }; document.head.appendChild(s); }); return loaded[src]; }
  function toast(m, w) { $('toast').className = 'toast show' + (w ? ' warn' : ''); $('toast').innerHTML = m; }
  function hideToast() { $('toast').className = 'toast'; }
  function hex(h) { return { r: parseInt(h.slice(1, 3), 16), g: parseInt(h.slice(3, 5), 16), b: parseInt(h.slice(5, 7), 16) }; }

  function open(file) {
    if (!file || file.type !== 'application/pdf' && !/\.pdf$/i.test(file.name)) { toast('<span class="lead">Erreur</span> ce fichier n\'est pas un PDF.', true); return; }
    fileName = file.name.replace(/\.pdf$/i, ''); toast('<span class="lead">Lecture</span>…');
    file.arrayBuffer().then(function (ab) { bytes = new Uint8Array(ab); return load(SRC.pdfjs, 'pdfjsLib', function () { window.pdfjsLib.GlobalWorkerOptions.workerSrc = SRC.worker; }); })
      .then(function (p) { return p.getDocument({ data: bytes.slice(0) }).promise; })
      .then(function (doc) { total = doc.numPages; return doc.getPage(1); })
      .then(function (pg) { var vp = pg.getViewport({ scale: 1 }); var cv = document.createElement('canvas'); cv.width = vp.width; cv.height = vp.height; return pg.render({ canvasContext: cv.getContext('2d'), viewport: vp }).promise.then(function () { baseImg = cv; $('drop').hidden = true; $('panel').hidden = false; $('info').innerHTML = '<b>' + total + '</b> page' + (total > 1 ? 's' : ''); hideToast(); preview(); }); })
      .catch(function () { toast('<span class="lead">Erreur</span> PDF illisible ou protégé.', true); });
  }

  function preview() {
    if (!baseImg) return;
    var cv = $('preview'); cv.width = baseImg.width; cv.height = baseImg.height;
    var ctx = cv.getContext('2d'); ctx.drawImage(baseImg, 0, 0);
    var txt = $('text').value || '', size = +$('size').value, rot = +$('rot').value, op = +$('opacity').value / 100, c = hex($('color').value);
    ctx.save(); ctx.globalAlpha = op; ctx.fillStyle = 'rgb(' + c.r + ',' + c.g + ',' + c.b + ')';
    ctx.font = '700 ' + size + 'px Helvetica, sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    if ($('mode').value === 'tile') {
      var step = size * 4;
      for (var y = 0; y < cv.height + step; y += step) for (var x = 0; x < cv.width + step; x += step) { ctx.save(); ctx.translate(x, y); ctx.rotate(-rot * Math.PI / 180); ctx.fillText(txt, 0, 0); ctx.restore(); }
    } else { ctx.translate(cv.width / 2, cv.height / 2); ctx.rotate(-rot * Math.PI / 180); ctx.fillText(txt, 0, 0); }
    ctx.restore();
  }

  function apply() {
    if (!bytes) return; toast('<span class="lead">Traitement</span> filigrane…');
    load(SRC.pdflib, 'PDFLib').then(function (PDFLib) {
      return PDFLib.PDFDocument.load(bytes).then(function (doc) {
        return doc.embedFont(PDFLib.StandardFonts.HelveticaBold).then(function (font) {
          var txt = $('text').value || '', size = +$('size').value, rot = +$('rot').value, op = +$('opacity').value / 100, c = hex($('color').value);
          var col = PDFLib.rgb(c.r / 255, c.g / 255, c.b / 255), mode = $('mode').value, deg = PDFLib.degrees(rot);
          doc.getPages().forEach(function (pg) {
            var sz = pg.getSize(), tw = font.widthOfTextAtSize(txt, size);
            if (mode === 'tile') {
              var step = size * 4;
              for (var y = 0; y < sz.height + step; y += step) for (var x = -step; x < sz.width + step; x += step) pg.drawText(txt, { x: x, y: y, size: size, font: font, color: col, opacity: op, rotate: deg });
            } else {
              pg.drawText(txt, { x: sz.width / 2 - tw / 2 * Math.cos(rot * Math.PI / 180), y: sz.height / 2 - tw / 2 * Math.sin(rot * Math.PI / 180), size: size, font: font, color: col, opacity: op, rotate: deg });
            }
          });
          return doc.save();
        });
      });
    }).then(function (u8) { hideToast(); var blob = new Blob([u8], { type: 'application/pdf' }), u = URL.createObjectURL(blob), a = document.createElement('a'); a.href = u; a.download = fileName + '-filigrane.pdf'; document.body.appendChild(a); a.click(); a.remove(); setTimeout(function () { URL.revokeObjectURL(u); }, 1500); })
      .catch(function (e) { toast('<span class="lead">Erreur</span> ' + e.message, true); });
  }

  ['text', 'mode', 'size', 'rot', 'color'].forEach(function (id) { $(id).addEventListener('input', preview); $(id).addEventListener('change', preview); });
  $('opacity').addEventListener('input', function () { $('oval').textContent = $('opacity').value; preview(); });
  $('apply').addEventListener('click', apply);
  $('reset').addEventListener('click', function () { bytes = null; baseImg = null; $('panel').hidden = true; $('drop').hidden = false; hideToast(); });
  $('drop').addEventListener('click', function () { $('file').click(); });
  $('drop').addEventListener('keydown', function (e) { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); $('file').click(); } });
  $('file').addEventListener('change', function () { if ($('file').files[0]) open($('file').files[0]); $('file').value = ''; });
  ['dragenter', 'dragover'].forEach(function (ev) { $('drop').addEventListener(ev, function (e) { e.preventDefault(); $('drop').classList.add('hot'); }); });
  ['dragleave', 'dragend', 'drop'].forEach(function (ev) { $('drop').addEventListener(ev, function (e) { e.preventDefault(); $('drop').classList.remove('hot'); }); });
  $('drop').addEventListener('drop', function (e) { if (e.dataTransfer.files[0]) open(e.dataTransfer.files[0]); });
  window.addEventListener('dragover', function (e) { if ($('drop').hidden || !$('drop').contains(e.target)) e.preventDefault(); });
  window.addEventListener('drop', function (e) { if ($('drop').hidden || !$('drop').contains(e.target)) e.preventDefault(); });
})();
</script>
</body>
</html>

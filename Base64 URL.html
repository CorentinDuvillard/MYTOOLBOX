<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Base64 & URL</title>
<link rel="stylesheet" href="./theme.css">
<link rel="stylesheet" href="./tool.css">
<style>
  .io{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media (max-width:760px){.io{grid-template-columns:1fr}}
  .io textarea{min-height:220px}
  .status{font-size:13px;margin-top:6px;min-height:20px;color:var(--muted)}
  .status.error{color:var(--accent-hover);font-weight:600}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:var(--radius-sm);overflow:hidden}
  .seg button{font-family:inherit;font-size:12.5px;padding:8px 12px;background:var(--surface);color:var(--muted);border:none;cursor:pointer}
  .seg button[aria-pressed=true]{background:var(--accent);color:var(--on-accent);font-weight:600}
</style>
</head>
<body>
<div class="wrap">
  <header class="tool-head">
    <div class="tool-mark"><span class="glyph" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7V4h16v3"/><path d="M9 20h6"/><path d="M12 4v16"/></svg></span>Base64 &amp; URL</div>
    <span class="tag">Encodage</span>
  </header>
  <p class="sub">Encodez et décodez du texte en Base64 (compatible UTF-8) ou en URL. Conversion instantanée, entièrement dans le navigateur.</p>

  <div class="toolbar">
    <div class="field"><span class="lbl">Méthode</span>
      <div class="seg" id="method" role="group" aria-label="Méthode">
        <button data-m="b64" aria-pressed="true">Base64</button>
        <button data-m="url" aria-pressed="false">URL</button>
      </div>
    </div>
    <div class="row" style="margin-left:auto;align-self:flex-end">
      <button class="btn" id="swap" title="Permuter entrée/sortie">⇄ Permuter</button>
      <button class="btn" id="copy">Copier</button>
      <button class="btn ghost" id="clear">Effacer</button>
    </div>
  </div>

  <div class="io">
    <div class="field"><label for="in">Texte clair</label><textarea id="in" spellcheck="false" placeholder="Tapez du texte à encoder…"></textarea></div>
    <div class="field"><label for="out">Encodé</label><textarea id="out" spellcheck="false" placeholder="…ou collez de l'encodé à décoder"></textarea></div>
  </div>
  <div class="status" id="status" role="status" aria-live="polite"></div>

  <footer class="foot"><span class="pt"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Traitement 100% local</span></footer>
</div>
<script>
(function () {
  "use strict";
  var $ = function (id) { return document.getElementById(id); };
  var inEl = $('in'), outEl = $('out'), statusEl = $('status'), method = 'b64', lock = false;

  function err(msg) { statusEl.textContent = msg; statusEl.className = 'status error'; }
  function clearStatus() { statusEl.textContent = ''; statusEl.className = 'status'; }

  function b64encode(str) { return btoa(String.fromCharCode.apply(null, Array.from(new TextEncoder().encode(str)))); }
  function b64decode(b64) { var bin = atob(b64.trim()); var bytes = Uint8Array.from(bin, function (c) { return c.charCodeAt(0); }); return new TextDecoder().decode(bytes); }

  function encode(str) { return method === 'b64' ? b64encode(str) : encodeURIComponent(str); }
  function decode(str) { return method === 'b64' ? b64decode(str) : decodeURIComponent(str.trim()); }

  function fromPlain() {
    if (lock) return; lock = true; clearStatus();
    try { outEl.value = inEl.value ? encode(inEl.value) : ''; } catch (e) { err('Encodage impossible : ' + e.message); }
    lock = false;
  }
  function fromEncoded() {
    if (lock) return; lock = true;
    try { inEl.value = outEl.value ? decode(outEl.value) : ''; clearStatus(); } catch (e) { err('Décodage impossible : entrée ' + (method === 'b64' ? 'Base64' : 'URL') + ' invalide.'); }
    lock = false;
  }

  inEl.addEventListener('input', fromPlain);
  outEl.addEventListener('input', fromEncoded);

  Array.prototype.forEach.call($('method').children, function (b) {
    b.addEventListener('click', function () {
      method = b.dataset.m;
      Array.prototype.forEach.call($('method').children, function (x) { x.setAttribute('aria-pressed', x === b ? 'true' : 'false'); });
      fromPlain();
    });
  });
  $('swap').addEventListener('click', function () { var t = inEl.value; inEl.value = outEl.value; outEl.value = t; fromPlain(); });
  $('clear').addEventListener('click', function () { inEl.value = ''; outEl.value = ''; clearStatus(); inEl.focus(); });
  $('copy').addEventListener('click', function () {
    var t = outEl.value || inEl.value; if (!t) return;
    navigator.clipboard.writeText(t).then(function () { var b = $('copy'), o = b.textContent; b.textContent = 'Copié ✓'; setTimeout(function () { b.textContent = o; }, 1200); });
  });
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formateur YAML</title>
<link rel="stylesheet" href="./theme.css">
<link rel="stylesheet" href="./tool.css">
<style>
  .io{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media (max-width:760px){.io{grid-template-columns:1fr}}
  .io textarea{min-height:340px}
  .status{font-size:13px;margin-top:6px;min-height:20px;color:var(--muted)}
  .status.error{color:var(--accent-hover);font-weight:600}
</style>
</head>
<body>
<div class="wrap">
  <header class="tool-head">
    <div class="tool-mark"><span class="glyph" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h10M4 12h16M4 18h7"/></svg></span>Formateur YAML</div>
    <span class="tag">YAML ⇄ JSON</span>
  </header>
  <p class="sub">Validez et réindentez du YAML, ou convertissez entre YAML et JSON. L'analyse (js-yaml) est chargée à la demande et s'exécute localement.</p>

  <div class="toolbar">
    <div class="row" style="margin-left:auto"><button class="btn primary" id="format">Reformater</button><button class="btn" id="toJson">→ JSON</button><button class="btn" id="fromJson">← depuis JSON</button><button class="btn" id="copy">Copier</button><button class="btn ghost" id="clear">Effacer</button></div>
  </div>
  <div class="io">
    <div class="field"><label for="in">Entrée</label><textarea id="in" spellcheck="false" placeholder="cle: valeur&#10;liste:&#10;  - un&#10;  - deux"></textarea></div>
    <div class="field"><label for="out">Résultat</label><textarea id="out" spellcheck="false" readonly placeholder="Résultat…"></textarea></div>
  </div>
  <div class="status" id="status" role="status" aria-live="polite"></div>

  <footer class="foot"><span class="pt"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Traitement 100% local</span></footer>
</div>
<script>
(function () {
  "use strict";
  var $ = function (id) { return document.getElementById(id); };
  var YAML_SRC = "https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js";
  var libP = null;
  function ensure() {
    if (window.jsyaml) return Promise.resolve(window.jsyaml);
    if (libP) return libP;
    libP = new Promise(function (res, rej) { var s = document.createElement('script'); s.src = YAML_SRC; s.onload = function () { res(window.jsyaml); }; s.onerror = function () { libP = null; rej(new Error('Échec du chargement de js-yaml.')); }; document.head.appendChild(s); });
    return libP;
  }
  function setStatus(m, e) { $('status').textContent = m; $('status').className = 'status' + (e ? ' error' : ''); }
  function withLib(fn) { setStatus('Chargement…'); ensure().then(function (Y) { setStatus(''); fn(Y); }).catch(function (e) { setStatus(e.message, true); }); }

  function format() { withLib(function (Y) { var src = $('in').value; if (!src.trim()) { $('out').value = ''; return; } try { var doc = Y.load(src); $('out').value = Y.dump(doc, { indent: 2, lineWidth: -1 }); setStatus('YAML valide.'); } catch (e) { setStatus('YAML invalide : ' + e.message.split('\n')[0], true); } }); }
  function toJson() { withLib(function (Y) { try { var doc = Y.load($('in').value); $('out').value = JSON.stringify(doc, null, 2); setStatus('Converti en JSON.'); } catch (e) { setStatus('YAML invalide : ' + e.message.split('\n')[0], true); } }); }
  function fromJson() { withLib(function (Y) { try { var doc = JSON.parse($('in').value); $('out').value = Y.dump(doc, { indent: 2, lineWidth: -1 }); setStatus('Converti en YAML.'); } catch (e) { setStatus('JSON invalide : ' + e.message, true); } }); }

  $('format').addEventListener('click', format);
  $('toJson').addEventListener('click', toJson);
  $('fromJson').addEventListener('click', fromJson);
  $('clear').addEventListener('click', function () { $('in').value = ''; $('out').value = ''; setStatus(''); $('in').focus(); });
  $('copy').addEventListener('click', function () { var t = $('out').value || $('in').value; if (!t) return; navigator.clipboard.writeText(t).then(function () { var b = $('copy'), o = b.textContent; b.textContent = 'Copié ✓'; setTimeout(function () { b.textContent = o; }, 1200); }); });
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convertisseur d'unités</title>
<link rel="stylesheet" href="./theme.css">
<link rel="stylesheet" href="./tool.css">
<style>
  .cats{display:flex;gap:8px;flex-wrap:wrap;margin:6px 0 18px}
  .cats button{font-family:inherit;font-size:13px;padding:8px 14px;border:1px solid var(--line);background:var(--surface);color:var(--muted);border-radius:99px;cursor:pointer}
  .cats button[aria-pressed=true]{background:var(--accent);color:var(--on-accent);border-color:var(--accent);font-weight:600}
  .conv{display:grid;grid-template-columns:1fr auto 1fr;gap:14px;align-items:end}
  @media (max-width:640px){.conv{grid-template-columns:1fr;text-align:center}}
  .swap{align-self:center;margin-bottom:6px}
  .big{font-size:18px;font-family:var(--font-mono)}
</style>
</head>
<body>
<div class="wrap">
  <header class="tool-head">
    <div class="tool-mark"><span class="glyph" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7h13l-3-3M21 17H8l3 3"/></svg></span>Convertisseur d'unités</div>
    <span class="tag">Mesures</span>
  </header>
  <p class="sub">Convertissez longueurs, masses, températures, données, temps, vitesses, surfaces et volumes. Conversion instantanée, entièrement locale.</p>

  <div class="cats" id="cats" role="group" aria-label="Catégorie"></div>

  <div class="conv">
    <div class="field"><label for="fromU">De</label><select id="fromU"></select><input type="number" id="fromV" class="big" value="1" inputmode="decimal" aria-label="Valeur de départ"></div>
    <button class="btn swap" id="swap" aria-label="Permuter">⇄</button>
    <div class="field"><label for="toU">Vers</label><select id="toU"></select><input type="text" id="toV" class="big" readonly aria-label="Valeur convertie"></div>
  </div>

  <footer class="foot"><span class="pt"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Traitement 100% local</span></footer>
</div>
<script>
(function () {
  "use strict";
  var $ = function (id) { return document.getElementById(id); };
  // value_in_base = value * factor (sauf température, gérée à part)
  var CATS = {
    'Longueur': { units: { 'mètre (m)': 1, 'kilomètre (km)': 1000, 'centimètre (cm)': 0.01, 'millimètre (mm)': 0.001, 'mile (mi)': 1609.344, 'yard (yd)': 0.9144, 'pied (ft)': 0.3048, 'pouce (in)': 0.0254, 'mille marin (nmi)': 1852 } },
    'Masse': { units: { 'kilogramme (kg)': 1, 'gramme (g)': 0.001, 'milligramme (mg)': 1e-6, 'tonne (t)': 1000, 'livre (lb)': 0.45359237, 'once (oz)': 0.028349523 } },
    'Température': { temp: true, units: { 'Celsius (°C)': 'C', 'Fahrenheit (°F)': 'F', 'Kelvin (K)': 'K' } },
    'Données': { units: { 'octet (o)': 1, 'kilo-octet (Ko)': 1e3, 'méga-octet (Mo)': 1e6, 'giga-octet (Go)': 1e9, 'téra-octet (To)': 1e12, 'kibi-octet (Kio)': 1024, 'mébi-octet (Mio)': 1048576, 'gibi-octet (Gio)': 1073741824, 'bit': 0.125 } },
    'Temps': { units: { 'seconde (s)': 1, 'milliseconde (ms)': 0.001, 'minute (min)': 60, 'heure (h)': 3600, 'jour (j)': 86400, 'semaine': 604800 } },
    'Vitesse': { units: { 'm/s': 1, 'km/h': 0.2777778, 'mph': 0.44704, 'nœud': 0.5144444, 'ft/s': 0.3048 } },
    'Surface': { units: { 'm²': 1, 'km²': 1e6, 'cm²': 1e-4, 'hectare (ha)': 1e4, 'pied² (ft²)': 0.092903, 'acre': 4046.8564 } },
    'Volume': { units: { 'litre (L)': 1, 'millilitre (mL)': 0.001, 'm³': 1000, 'cm³': 0.001, 'gallon US': 3.785411784, 'pinte US': 0.473176473 } }
  };
  var current = 'Longueur';

  function toC(v, u) { return u === 'C' ? v : u === 'F' ? (v - 32) * 5 / 9 : v - 273.15; }
  function fromC(v, u) { return u === 'C' ? v : u === 'F' ? v * 9 / 5 + 32 : v + 273.15; }

  function fmt(n) { if (!isFinite(n)) return '—'; if (n === 0) return '0'; var a = Math.abs(n); if (a >= 1e15 || a < 1e-6) return n.toExponential(6).replace(/\.?0+e/, 'e'); return parseFloat(n.toPrecision(10)).toString(); }

  function fillUnits() {
    var u = CATS[current].units, opts = '';
    Object.keys(u).forEach(function (k) { opts += '<option value="' + k + '">' + k + '</option>'; });
    $('fromU').innerHTML = opts; $('toU').innerHTML = opts;
    var keys = Object.keys(u); $('toU').value = keys[1] || keys[0];
  }
  function convert() {
    var c = CATS[current], v = parseFloat($('fromV').value); if (isNaN(v)) { $('toV').value = ''; return; }
    var fu = $('fromU').value, tu = $('toU').value, res;
    if (c.temp) { res = fromC(toC(v, c.units[fu]), c.units[tu]); }
    else { res = v * c.units[fu] / c.units[tu]; }
    $('toV').value = fmt(res);
  }
  function buildCats() {
    var html = '';
    Object.keys(CATS).forEach(function (k) { html += '<button data-c="' + k + '" aria-pressed="' + (k === current) + '">' + k + '</button>'; });
    $('cats').innerHTML = html;
    Array.prototype.forEach.call($('cats').children, function (b) {
      b.addEventListener('click', function () {
        current = b.dataset.c;
        Array.prototype.forEach.call($('cats').children, function (x) { x.setAttribute('aria-pressed', x === b ? 'true' : 'false'); });
        fillUnits(); convert();
      });
    });
  }
  $('fromV').addEventListener('input', convert);
  $('fromU').addEventListener('change', convert);
  $('toU').addEventListener('change', convert);
  $('swap').addEventListener('click', function () { var a = $('fromU').value; $('fromU').value = $('toU').value; $('toU').value = a; if ($('toV').value) $('fromV').value = $('toV').value; convert(); });
  buildCats(); fillUnits(); convert();
})();
</script>
</body>
</html>

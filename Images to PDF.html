<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Images en PDF</title>
<link rel="stylesheet" href="./theme.css">
<link rel="stylesheet" href="./tool.css">
<style>
  .pages{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px;margin-top:18px}
  .pg{border:1px solid var(--line);border-radius:var(--radius);background:var(--surface);overflow:hidden}
  .pg .thumb{background:var(--surface-2);display:flex;align-items:center;justify-content:center;padding:8px;min-height:110px}
  .pg .thumb img{max-width:100%;max-height:140px;border-radius:4px}
  .pg .bar{display:flex;align-items:center;gap:2px;padding:5px 6px;border-top:1px solid var(--line)}
  .pg .num{font-size:11px;color:var(--muted);font-family:var(--font-mono);margin-right:auto}
  .pg .ib{width:24px;height:24px;display:grid;place-items:center;border:none;background:transparent;color:var(--muted);cursor:pointer;border-radius:6px}
  .pg .ib:hover{background:var(--surface-2);color:var(--text)} .pg .ib.del:hover{color:var(--accent)}
  .pg .ib svg{width:14px;height:14px}
</style>
</head>
<body>
<div class="wrap">
  <header class="tool-head">
    <div class="tool-mark"><span class="glyph" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="9" cy="9" r="1.6"/><path d="m21 15-5-5L5 21"/></svg></span>Images en PDF</div>
    <span class="tag">→ PDF</span>
  </header>
  <p class="sub">Assemblez plusieurs images en un seul PDF. Réorganisez l'ordre, choisissez le format de page, puis exportez. Génération locale (pdf-lib).</p>

  <div class="drop" id="drop" tabindex="0" role="button" aria-label="Ajouter des images">
    <div class="bigicon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg></div>
    <h2>Glissez vos images ici</h2><p>ou cliquez pour les sélectionner</p>
  </div>
  <input type="file" id="file" accept="image/*" multiple hidden>

  <div id="panel" hidden>
    <div class="toolbar">
      <div class="field" style="min-width:140px"><label for="psize">Format de page</label><select id="psize"><option value="fit">Taille de l'image</option><option value="a4p">A4 portrait</option><option value="a4l">A4 paysage</option></select></div>
      <div class="field" style="min-width:120px"><label for="margin">Marge (pt)</label><input type="number" id="margin" value="0" min="0" max="120"></div>
      <div class="row" style="margin-left:auto;align-self:flex-end"><button class="btn primary" id="export">Exporter le PDF</button><button class="btn ghost" id="clear">Effacer</button></div>
    </div>
    <div class="pages" id="pages"></div>
  </div>
  <div class="toast" id="toast" role="status"></div>
  <footer class="foot"><span class="pt"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Traitement 100% local</span></footer>
</div>
<script>
(function () {
  "use strict";
  var $ = function (id) { return document.getElementById(id); };
  var SRC = "https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js", libP = null;
  function lib() { if (window.PDFLib) return Promise.resolve(window.PDFLib); if (libP) return libP; libP = new Promise(function (res, rej) { var s = document.createElement('script'); s.src = SRC; s.onload = function () { res(window.PDFLib); }; s.onerror = function () { libP = null; rej(new Error('Échec du chargement de pdf-lib.')); }; document.head.appendChild(s); }); return libP; }
  var items = [], seq = 0;
  var ICONS = { left: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>', right: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>', del: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>' };
  function toast(m, w) { $('toast').className = 'toast show' + (w ? ' warn' : ''); $('toast').innerHTML = m; }
  function hideToast() { $('toast').className = 'toast'; }

  function add(list) {
    var files = Array.prototype.slice.call(list).filter(function (f) { return f.type.startsWith('image/'); });
    files.forEach(function (f) { items.push({ id: ++seq, file: f, url: URL.createObjectURL(f), type: f.type, name: f.name }); });
    $('panel').hidden = items.length === 0; $('drop').hidden = items.length > 0; refresh();
  }
  function refresh() {
    $('pages').innerHTML = '';
    items.forEach(function (it, i) {
      var el = document.createElement('div'); el.className = 'pg';
      el.innerHTML = '<div class="thumb"><img alt="" src="' + it.url + '"></div><div class="bar"><span class="num">' + (i + 1) + '</span><button class="ib" title="Reculer">' + ICONS.left + '</button><button class="ib" title="Avancer">' + ICONS.right + '</button><button class="ib del" title="Retirer">' + ICONS.del + '</button></div>';
      var b = el.querySelectorAll('.ib');
      b[0].onclick = function () { if (i > 0) { items.splice(i - 1, 0, items.splice(i, 1)[0]); refresh(); } };
      b[1].onclick = function () { if (i < items.length - 1) { items.splice(i + 1, 0, items.splice(i, 1)[0]); refresh(); } };
      b[2].onclick = function () { URL.revokeObjectURL(it.url); items.splice(i, 1); if (!items.length) { $('panel').hidden = true; $('drop').hidden = false; } refresh(); };
      $('pages').appendChild(el);
    });
  }

  function toPngBytes(it) { // normalise tout format en PNG pour l'embarquement
    return new Promise(function (resolve, reject) {
      var img = new Image(); img.onload = function () { var c = document.createElement('canvas'); c.width = img.naturalWidth; c.height = img.naturalHeight; c.getContext('2d').drawImage(img, 0, 0); c.toBlob(function (b) { b.arrayBuffer().then(function (ab) { resolve({ bytes: new Uint8Array(ab), w: img.naturalWidth, h: img.naturalHeight }); }); }, 'image/png'); };
      img.onerror = function () { reject(new Error('Image illisible : ' + it.name)); }; img.src = it.url;
    });
  }

  function exportPdf() {
    if (!items.length) return;
    toast('<span class="lead">Export</span> assemblage du PDF…');
    lib().then(function (PDFLib) {
      return PDFLib.PDFDocument.create().then(function (doc) {
        var mode = $('psize').value, margin = +$('margin').value || 0;
        var chain = Promise.resolve();
        items.forEach(function (it) {
          chain = chain.then(function () { return toPngBytes(it); }).then(function (im) {
            return doc.embedPng(im.bytes).then(function (png) {
              var pw, ph;
              if (mode === 'a4p') { pw = 595.28; ph = 841.89; } else if (mode === 'a4l') { pw = 841.89; ph = 595.28; } else { pw = im.w + margin * 2; ph = im.h + margin * 2; }
              var page = doc.addPage([pw, ph]);
              var availW = pw - margin * 2, availH = ph - margin * 2;
              var s = Math.min(availW / im.w, availH / im.h, mode === 'fit' ? 1 : Infinity);
              var w = im.w * s, h = im.h * s;
              page.drawImage(png, { x: (pw - w) / 2, y: (ph - h) / 2, width: w, height: h });
            });
          });
        });
        return chain.then(function () { return doc.save(); });
      });
    }).then(function (u8) {
      hideToast();
      var blob = new Blob([u8], { type: 'application/pdf' }), u = URL.createObjectURL(blob), a = document.createElement('a'); a.href = u; a.download = 'images.pdf'; document.body.appendChild(a); a.click(); a.remove(); setTimeout(function () { URL.revokeObjectURL(u); }, 1500);
    }).catch(function (e) { toast('<span class="lead">Erreur</span> ' + e.message, true); });
  }

  $('export').addEventListener('click', exportPdf);
  $('clear').addEventListener('click', function () { items.forEach(function (it) { URL.revokeObjectURL(it.url); }); items = []; $('panel').hidden = true; $('drop').hidden = false; hideToast(); });
  $('drop').addEventListener('click', function () { $('file').click(); });
  $('drop').addEventListener('keydown', function (e) { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); $('file').click(); } });
  $('file').addEventListener('change', function () { add($('file').files); $('file').value = ''; });
  ['dragenter', 'dragover'].forEach(function (ev) { $('drop').addEventListener(ev, function (e) { e.preventDefault(); $('drop').classList.add('hot'); }); });
  ['dragleave', 'dragend', 'drop'].forEach(function (ev) { $('drop').addEventListener(ev, function (e) { e.preventDefault(); $('drop').classList.remove('hot'); }); });
  $('drop').addEventListener('drop', function (e) { if (e.dataTransfer.files.length) add(e.dataTransfer.files); });
  window.addEventListener('dragover', function (e) { if ($('drop').hidden || !$('drop').contains(e.target)) e.preventDefault(); });
  window.addEventListener('drop', function (e) { if ($('drop').hidden || !$('drop').contains(e.target)) e.preventDefault(); });
})();
</script>
</body>
</html>

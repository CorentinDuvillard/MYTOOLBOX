<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ToolBox — Vos outils en local</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root {
      --cream:#FAF7F2; --cream-dark:#F3EDE4; --sand:#E8DFD1;
      --camel:#C4A87C; --camel-light:#D4BE9A; --camel-dark:#A8895E;
      --brown:#6B5B4E; --brown-dark:#4A3F35; --brown-deep:#3A3129;
      --text:#3A3129; --text-light:#7A6E63; --text-muted:#A69A8E;
      --white:#FFF;
    }
    * { box-sizing: border-box; }
    html, body, #root { margin: 0; padding: 0; min-height: 100%; }
    body {
      background: var(--cream);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ───── Landing ───── */
    .landing { min-height: 100vh; display: flex; flex-direction: column; }
    .landing-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 22px clamp(20px, 5vw, 72px);
      border-bottom: 1px solid rgba(107,91,78,.08);
    }
    .brand {
      display: flex; align-items: center; gap: 12px;
      text-decoration: none; cursor: pointer;
    }
    .brand-mark {
      width: 34px; height: 34px; border-radius: 10px;
      background: linear-gradient(135deg, var(--camel), var(--camel-dark));
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 700; letter-spacing: .5px; font-size: 14px;
      flex-shrink: 0;
    }
    .brand-text { display: flex; flex-direction: column; line-height: 1.1; }
    .brand-name { font-size: 15px; font-weight: 700; color: var(--brown-deep); letter-spacing: -.01em; }
    .brand-sub { font-size: 11px; color: var(--text-muted); letter-spacing: .04em; text-transform: uppercase; }
    .nav { display: flex; gap: 28px; font-size: 13.5px; color: var(--text-light); }
    .nav a { color: inherit; text-decoration: none; transition: color .15s ease; cursor: pointer; }
    .nav a:hover { color: var(--brown-dark); }

    .hero {
      padding: clamp(56px, 9vw, 112px) clamp(20px, 5vw, 72px) clamp(28px, 4vw, 48px);
      max-width: 980px;
    }
    .hero-eyebrow {
      font-size: 11px; font-weight: 600; letter-spacing: .18em;
      text-transform: uppercase; color: var(--camel-dark); margin-bottom: 20px;
    }
    .hero-title {
      font-size: clamp(32px, 5.2vw, 56px); line-height: 1.05;
      font-weight: 500; letter-spacing: -.022em;
      color: var(--brown-deep); margin: 0 0 20px;
    }
    .hero-title em { font-style: normal; color: var(--camel-dark); }
    .hero-lead {
      font-size: clamp(15px, 1.5vw, 18px); line-height: 1.6;
      color: var(--text-light); max-width: 620px; margin: 0;
    }

    .studios {
      padding: 24px clamp(20px, 5vw, 72px) 64px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }
    .card {
      background: var(--cream-dark);
      border: 1px solid rgba(107,91,78,.08);
      border-radius: 20px;
      padding: 28px;
      display: flex; flex-direction: column; gap: 14px;
      transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease;
      opacity: 0;
      transform: translateY(18px);
      animation: cardIn .45s ease forwards;
    }
    .card:nth-child(1) { animation-delay: .05s; }
    .card:nth-child(2) { animation-delay: .13s; }
    .card:nth-child(3) { animation-delay: .21s; }
    @keyframes cardIn {
      to { opacity: 1; transform: translateY(0); }
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 18px 44px -26px rgba(58,49,41,.35);
      border-color: rgba(168,137,94,.28);
    }
    .card-head { display: flex; align-items: center; justify-content: space-between; }
    .card-icon {
      width: 44px; height: 44px; border-radius: 12px;
      background: var(--sand); color: var(--brown-dark);
      display: flex; align-items: center; justify-content: center;
    }
    .card-tag {
      font-size: 10.5px; letter-spacing: .14em; text-transform: uppercase;
      color: var(--camel-dark); font-weight: 600;
    }
    .card h3 {
      font-size: 22px; font-weight: 600; letter-spacing: -.012em;
      margin: 2px 0 0; color: var(--brown-deep);
    }
    .card p {
      font-size: 14px; line-height: 1.55; color: var(--text-light); margin: 0;
    }
    .card-use {
      font-size: 12px; color: var(--text-muted); margin-top: -4px;
    }
    .card-btn {
      margin-top: 6px; align-self: flex-start;
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 18px; border-radius: 999px;
      background: var(--brown-deep); color: var(--cream);
      border: none; font-size: 13px; font-weight: 500;
      cursor: pointer; font-family: inherit;
      transition: background .15s ease, transform .1s ease;
    }
    .card-btn:hover { background: var(--brown-dark); }
    .card-btn:active { transform: scale(.98); }
    .card-btn[disabled] { opacity: .55; cursor: wait; }

    .footer {
      margin-top: auto;
      padding: 22px clamp(20px, 5vw, 72px);
      border-top: 1px solid rgba(107,91,78,.08);
      font-size: 12px; color: var(--text-muted);
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 8px;
    }

    .error-banner {
      margin: 0 clamp(20px, 5vw, 72px) 24px;
      padding: 12px 16px;
      background: var(--white);
      border: 1px solid var(--sand);
      color: var(--brown-dark);
      border-radius: 12px;
      font-size: 13px;
    }

    /* ───── À propos ───── */
    .about-page {
      min-height: 100vh; display: flex; flex-direction: column;
      animation: fadeIn .35s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    .about-body {
      padding: clamp(48px, 8vw, 96px) clamp(20px, 5vw, 72px);
      max-width: 720px;
    }
    .about-eyebrow {
      font-size: 11px; font-weight: 600; letter-spacing: .18em;
      text-transform: uppercase; color: var(--camel-dark); margin-bottom: 20px;
    }
    .about-title {
      font-size: clamp(28px, 4vw, 44px); line-height: 1.1;
      font-weight: 500; letter-spacing: -.018em;
      color: var(--brown-deep); margin: 0 0 32px;
    }
    .about-section { margin-bottom: 40px; }
    .about-section-title {
      font-size: 12px; font-weight: 700; letter-spacing: .14em;
      text-transform: uppercase; color: var(--camel-dark);
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(107,91,78,.1);
    }
    .about-text {
      font-size: 15px; line-height: 1.75; color: var(--text-light);
    }
    .about-text p { margin: 0 0 16px; }
    .about-text p:last-child { margin-bottom: 0; }
    .about-link {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 20px; border-radius: 999px;
      background: var(--brown-deep); color: var(--cream);
      text-decoration: none; font-size: 13px; font-weight: 500;
      transition: background .15s ease, transform .1s ease;
      margin-top: 8px;
    }
    .about-link:hover { background: var(--brown-dark); transform: translateY(-1px); }

    /* ───── Studio stage ───── */
    .studio-stage {
      position: fixed; inset: 0; z-index: 10;
      background: var(--cream);
      overflow: hidden;
      animation: fadeIn .25s ease;
    }
    .studio-mount { position: absolute; inset: 0; overflow: auto; }
    .studio-back {
      position: fixed; top: 14px; left: 14px; z-index: 1000;
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 14px; border-radius: 999px;
      background: rgba(250,247,242,.92);
      color: var(--brown-deep);
      border: 1px solid rgba(107,91,78,.18);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      font-size: 13px; font-weight: 700; cursor: pointer;
      font-family: inherit;
      box-shadow: 0 8px 22px -14px rgba(58,49,41,.5);
      transition: background .15s ease, border-color .15s ease, transform .1s ease;
      text-decoration: none;
    }
    .studio-back:hover {
      background: var(--cream);
      border-color: rgba(168,137,94,.35);
      transform: translateY(-1px);
    }
    .studio-back-mark {
      width: 22px; height: 22px; border-radius: 6px;
      background: linear-gradient(135deg, var(--camel), var(--camel-dark));
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 700; font-size: 11px; flex-shrink: 0;
    }
    .studio-loader {
      position: fixed; inset: 0; z-index: 20;
      background: var(--cream);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-light); font-size: 14px; letter-spacing: .02em;
    }
    .studio-loader .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--camel); margin-right: 10px;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: .3; } 50% { opacity: 1; } }

    @media (max-width: 600px) {
      .nav { display: none; }
      .footer { flex-direction: column; align-items: flex-start; gap: 4px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    window.__studioCache = window.__studioCache || {};

    async function loadStudio(path, globalName) {
      if (window[globalName]) return window[globalName];
      if (window.__studioCache[globalName]) return window.__studioCache[globalName];

      const res = await fetch(path);
      if (!res.ok) throw new Error(`Chargement échoué (${res.status}) : ${path}`);
      const raw = await res.text();

      let detected = null;
      let src = raw
        .replace(/^\s*import\s[\s\S]*?from\s+["'][^"']+["'];?\s*$/gm, "")
        .replace(/export\s+default\s+function\s+(\w+)/, (_, n) => {
          detected = n;
          return "function " + n;
        })
        .replace(/export\s+default\s+(\w+)\s*;?/, (_, n) => {
          if (!detected) detected = n;
          return "";
        });

      const hasHookShim = /const\s*\{[^}]*\buseState\b[^}]*\}\s*=\s*React/.test(src);
      if (!hasHookShim) {
        src =
          "const { useState, useEffect, useRef, useCallback, useMemo, " +
          "useLayoutEffect, useReducer, useContext } = React;\n" + src;
      }

      if (detected) {
        src += `\n;window[${JSON.stringify(globalName)}] = ${detected};`;
      }

      const out = Babel.transform(src, {
        presets: ["react"],
        filename: path,
        sourceType: "script",
      });
      new Function(out.code)();

      if (!window[globalName]) {
        throw new Error(`Composant racine introuvable après chargement : ${globalName}`);
      }
      window.__studioCache[globalName] = window[globalName];
      return window[globalName];
    }
  </script>

  <script type="text/babel">
    const { useState, useCallback, useEffect } = React;

    const STUDIOS = [
      {
        id: "vision",
        name: "Vision Studio",
        tag: "Image",
        use: "Composition visuelle",
        path: "./Vision%20Studio.jsx",
        global: "ImageEditor",
        desc: "Éditeur d'image sur canvas — calques, texte, formes, réglages, export.",
        icon: (
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="3" />
            <circle cx="9" cy="9" r="1.5" />
            <path d="m21 15-5-5L5 21" />
          </svg>
        ),
      },
      {
        id: "record",
        name: "Record Studio",
        tag: "Capture",
        use: "Audio, vidéo, audio + vidéo",
        path: "./Record%20Studio.jsx",
        global: "RecordStudio",
        desc: "Enregistreur navigateur — sélection des sources, prévisualisation, téléchargement.",
        icon: (
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round">
            <circle cx="12" cy="12" r="9" />
            <circle cx="12" cy="12" r="3.5" fill="currentColor" stroke="none" />
          </svg>
        ),
      },
      {
        id: "pdf",
        name: "PDF Studio",
        tag: "Document",
        use: "Édition & fusion PDF",
        path: "./PDF%20Studio.jsx",
        global: "PDFStudio",
        desc: "Annote, dessine, compose du texte et fusionne plusieurs PDF en un seul export.",
        icon: (
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z" />
            <path d="M14 2v6h6" />
            <path d="M9 14h6M9 18h4" />
          </svg>
        ),
      },
    ];

    function BrandLogo({ onClick }) {
      return (
        <button className="brand" onClick={onClick} aria-label="Retour à l'accueil" style={{background:"none",border:"none",padding:0}}>
          <div className="brand-mark">TB</div>
          <div className="brand-text">
            <span className="brand-name">ToolBox</span>
            <span className="brand-sub">By Corentin Duvillard</span>
          </div>
        </button>
      );
    }

    function Landing({ onOpen, loadingId, error, onAbout }) {
      return (
        <div className="landing">
          <header className="landing-header">
            <BrandLogo onClick={() => {}} />
            <nav className="nav">
              <a href="#studios">Studios</a>
              <a onClick={onAbout}>À propos</a>
            </nav>
          </header>

          <section className="hero">
            <div className="hero-eyebrow">Trois outils · Un environnement</div>
            <h1 className="hero-title">
              Créez, capturez et <em>annotez</em><br />
              directement depuis votre navigateur.
            </h1>
            <p className="hero-lead">
              ToolBox rassemble trois studios légers — image, média et PDF —
              dans une interface unifiée, sobre et sans installation.
            </p>
          </section>

          {error && <div className="error-banner">{error}</div>}

          <section id="studios" className="studios">
            {STUDIOS.map((s) => (
              <article key={s.id} className="card">
                <div className="card-head">
                  <div className="card-icon">{s.icon}</div>
                  <span className="card-tag">{s.tag}</span>
                </div>
                <h3>{s.name}</h3>
                <p>{s.desc}</p>
                <div className="card-use">{s.use}</div>
                <button
                  className="card-btn"
                  onClick={() => onOpen(s)}
                  disabled={loadingId === s.id}
                >
                  {loadingId === s.id ? "Chargement…" : "Ouvrir le studio →"}
                </button>
              </article>
            ))}
          </section>

          <footer className="footer">
            <span>© ToolBox — Studios locals</span>
            <span>Tout vos outils en local</span>
          </footer>
        </div>
      );
    }

    function AboutPage({ onHome }) {
      return (
        <div className="about-page">
          <header className="landing-header">
            <BrandLogo onClick={onHome} />
            <nav className="nav">
              <a onClick={onHome}>Studios</a>
              <a style={{color:"var(--brown-deep)",fontWeight:600}}>À propos</a>
            </nav>
          </header>

          <div className="about-body">
            <div className="about-eyebrow">À propos</div>
            <h1 className="about-title">À propos de ToolBox</h1>

            <div className="about-section">
              <div className="about-section-title">Le projet</div>
              <div className="about-text">
                <p>ToolBox est une boîte à outils gratuite destinée à toutes les personnes qui souhaitent disposer d'un ensemble d'outils pratiques, centralisés et accessibles sans abonnement.</p>
                <p>Le projet a été conçu pour répondre à un besoin simple : disposer d'outils efficaces pour traiter des documents, enregistrer de l'audio, manipuler des fichiers et travailler plus rapidement depuis un seul espace.</p>
              </div>
            </div>

            <div className="about-section">
              <div className="about-section-title">Confidentialité & RGPD</div>
              <div className="about-text">
                <p>Tous les outils s'exécutent localement dans le navigateur. Cela signifie que les fichiers ne sont pas envoyés vers un serveur externe, ce qui limite les risques de perte de données et favorise un environnement respectueux de la confidentialité et du RGPD.</p>
              </div>
            </div>

            <div className="about-section">
              <div className="about-section-title">Le créateur</div>
              <div className="about-text">
                <p>ToolBox a été créé par Corentin Duvillard, étudiant en finance, travaillant quotidiennement sur ordinateur et confronté à la nécessité de traiter de nombreux documents. Les solutions existantes étaient souvent dispersées, limitées ou payantes. ToolBox vise donc à proposer une alternative centralisée, simple et gratuite.</p>
              </div>
              <a
                href="https://www.linkedin.com/in/corentin-duvillard"
                target="_blank"
                rel="noopener noreferrer"
                className="about-link"
              >
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
                LinkedIn — Corentin Duvillard
              </a>
            </div>

            <div className="about-section">
              <div className="about-section-title">Mentions légales</div>
              <div className="about-text">
                <p>Tous droits réservés — Corentin Duvillard.</p>
              </div>
            </div>
          </div>

          <footer className="footer">
            <span>© ToolBox — Studios locals</span>
            <span>Tout vos outils en local</span>
          </footer>
        </div>
      );
    }

    function StudioStage({ studio, onClose }) {
      const Comp = window[studio.global];
      useEffect(() => {
        const onKey = (e) => { if (e.key === "Escape") onClose(); };
        window.addEventListener("keydown", onKey);
        return () => window.removeEventListener("keydown", onKey);
      }, [onClose]);

      return (
        <div className="studio-stage">
          <button className="studio-back" onClick={onClose} aria-label="Retour à l'accueil ToolBox">
            <div className="studio-back-mark">TB</div>
            ToolBox
          </button>
          <div className="studio-mount">
            {Comp ? React.createElement(Comp) : null}
          </div>
        </div>
      );
    }

    function App() {
      const [view, setView] = useState("landing");
      const [active, setActive] = useState(null);
      const [loadingId, setLoadingId] = useState(null);
      const [error, setError] = useState(null);

      const open = useCallback(async (studio) => {
        setError(null);
        setLoadingId(studio.id);
        try {
          await loadStudio(studio.path, studio.global);
          setActive(studio);
          setView("studio");
        } catch (e) {
          setError(e && e.message ? e.message : String(e));
        } finally {
          setLoadingId(null);
        }
      }, []);

      const goHome = useCallback(() => { setView("landing"); setActive(null); }, []);
      const goAbout = useCallback(() => setView("about"), []);

      if (view === "studio" && active) return <StudioStage studio={active} onClose={goHome} />;
      if (view === "about") return <AboutPage onHome={goHome} />;
      return <Landing onOpen={open} loadingId={loadingId} error={error} onAbout={goAbout} />;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>

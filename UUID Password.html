<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UUID & mot de passe</title>
<link rel="stylesheet" href="./theme.css">
<link rel="stylesheet" href="./tool.css">
<style>
  .panel{border:1px solid var(--line);border-radius:var(--radius);padding:20px;background:var(--surface);margin-top:16px}
  .panel h2{font-size:15px;font-weight:600;margin-bottom:14px;color:var(--text)}
  .out{font-family:var(--font-mono);font-size:14px;background:var(--surface-2);border:1px solid var(--line);border-radius:var(--radius-sm);padding:12px 14px;word-break:break-all;min-height:46px;display:flex;align-items:center}
  .uuidlist{display:flex;flex-direction:column;gap:8px}
  .check{display:inline-flex;align-items:center;gap:7px;font-size:13px;color:var(--muted);cursor:pointer}
  .check input{width:16px;height:16px;accent-color:var(--accent)}
  .opts{display:flex;gap:16px;flex-wrap:wrap;margin:12px 0}
</style>
</head>
<body>
<div class="wrap">
  <header class="tool-head">
    <div class="tool-mark"><span class="glyph" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>UUID &amp; mot de passe</div>
    <span class="tag">Aléatoire sûr</span>
  </header>
  <p class="sub">Générez des identifiants UUID v4 et des mots de passe robustes à l'aide du générateur cryptographique du navigateur (Web Crypto). Rien n'est stocké ni transmis.</p>

  <div class="panel">
    <h2>Mot de passe</h2>
    <div class="out" id="pwOut" aria-live="polite"></div>
    <div class="row" style="margin:12px 0"><label class="lbl" for="len">Longueur — <span id="lenval" class="mono">20</span></label><input type="range" id="len" min="6" max="64" value="20" style="max-width:280px"></div>
    <div class="opts">
      <label class="check"><input type="checkbox" id="upper" checked> Majuscules</label>
      <label class="check"><input type="checkbox" id="lower" checked> Minuscules</label>
      <label class="check"><input type="checkbox" id="digit" checked> Chiffres</label>
      <label class="check"><input type="checkbox" id="sym" checked> Symboles</label>
    </div>
    <div class="row"><button class="btn primary" id="genPw">Générer</button><button class="btn" id="cpPw">Copier</button></div>
  </div>

  <div class="panel">
    <h2>UUID v4</h2>
    <div class="uuidlist" id="uuidList"></div>
    <div class="row" style="margin-top:12px"><label class="lbl" for="count">Combien</label>
      <select id="count" style="max-width:90px"><option>1</option><option>5</option><option>10</option><option>25</option></select>
      <button class="btn primary" id="genUuid">Générer</button><button class="btn" id="cpUuid">Tout copier</button>
    </div>
  </div>

  <footer class="foot"><span class="pt"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Traitement 100% local</span></footer>
</div>
<script>
(function () {
  "use strict";
  var $ = function (id) { return document.getElementById(id); };

  function pick(set, n) { var out = '', a = new Uint32Array(n); crypto.getRandomValues(a); for (var i = 0; i < n; i++) out += set[a[i] % set.length]; return out; }
  function shuffle(str) { var arr = str.split(''), a = new Uint32Array(arr.length); crypto.getRandomValues(a); for (var i = arr.length - 1; i > 0; i--) { var j = a[i] % (i + 1); var t = arr[i]; arr[i] = arr[j]; arr[j] = t; } return arr.join(''); }

  function genPw() {
    var sets = [], len = +$('len').value;
    if ($('upper').checked) sets.push('ABCDEFGHIJKLMNOPQRSTUVWXYZ');
    if ($('lower').checked) sets.push('abcdefghijklmnopqrstuvwxyz');
    if ($('digit').checked) sets.push('23456789');
    if ($('sym').checked) sets.push('!@#$%^&*-_=+?');
    if (!sets.length) { $('pwOut').textContent = 'Cochez au moins un type de caractère.'; return; }
    var all = sets.join(''), pw = '';
    sets.forEach(function (s) { pw += pick(s, 1); });           // au moins un de chaque
    pw += pick(all, Math.max(0, len - sets.length));
    $('pwOut').textContent = shuffle(pw).slice(0, len);
  }
  function newUuid() { return (crypto.randomUUID ? crypto.randomUUID() : fallbackUuid()); }
  function fallbackUuid() { var b = new Uint8Array(16); crypto.getRandomValues(b); b[6] = (b[6] & 0x0f) | 0x40; b[8] = (b[8] & 0x3f) | 0x80; var h = Array.from(b, function (x) { return x.toString(16).padStart(2, '0'); }); return h.slice(0, 4).join('') + '-' + h.slice(4, 6).join('') + '-' + h.slice(6, 8).join('') + '-' + h.slice(8, 10).join('') + '-' + h.slice(10).join(''); }

  function genUuids() {
    var n = +$('count').value, list = $('uuidList'); list.innerHTML = '';
    for (var i = 0; i < n; i++) { var d = document.createElement('div'); d.className = 'out'; d.textContent = newUuid(); list.appendChild(d); }
  }
  function copy(text, btn) { if (!text) return; navigator.clipboard.writeText(text).then(function () { var o = btn.textContent; btn.textContent = 'Copié ✓'; setTimeout(function () { btn.textContent = o; }, 1100); }); }

  $('len').addEventListener('input', function () { $('lenval').textContent = $('len').value; genPw(); });
  ['upper', 'lower', 'digit', 'sym'].forEach(function (id) { $(id).addEventListener('change', genPw); });
  $('genPw').addEventListener('click', genPw);
  $('cpPw').addEventListener('click', function () { copy($('pwOut').textContent, $('cpPw')); });
  $('genUuid').addEventListener('click', genUuids);
  $('cpUuid').addEventListener('click', function () { copy(Array.prototype.map.call($('uuidList').children, function (d) { return d.textContent; }).join('\n'), $('cpUuid')); });

  genPw(); genUuids();
})();
</script>
</body>
</html>

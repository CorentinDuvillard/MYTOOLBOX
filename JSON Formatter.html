<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formateur JSON</title>
<link rel="stylesheet" href="./theme.css">
<link rel="stylesheet" href="./tool.css">
<style>
  .io{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media (max-width:760px){.io{grid-template-columns:1fr}}
  .io textarea{min-height:360px}
  .ok{color:var(--accent)} /* statut valide en accent neutre via classe */
  .status{font-size:13px;margin-top:6px;min-height:20px}
  .status.valid{color:var(--muted)} .status.error{color:var(--accent-hover);font-weight:600}
</style>
</head>
<body>
<div class="wrap">
  <header class="tool-head">
    <div class="tool-mark"><span class="glyph" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H7a2 2 0 0 0-2 2v4a2 2 0 0 1-2 2 2 2 0 0 1 2 2v4a2 2 0 0 0 2 2h1"/><path d="M16 3h1a2 2 0 0 1 2 2v4a2 2 0 0 0 2 2 2 2 0 0 0-2 2v4a2 2 0 0 1-2 2h-1"/></svg></span>Formateur JSON</div>
    <span class="tag">JSON</span>
  </header>
  <p class="sub">Indentez, minifiez et validez du JSON. La structure et les erreurs (ligne/colonne) sont détectées localement. Rien n'est envoyé sur un serveur.</p>

  <div class="toolbar" id="toolbar">
    <div class="field" style="min-width:130px"><label for="indent">Indentation</label>
      <select id="indent"><option value="2">2 espaces</option><option value="4">4 espaces</option><option value="tab">Tabulation</option></select>
    </div>
    <div class="row" style="margin-left:auto;align-self:flex-end">
      <button class="btn primary" id="format">Formater</button>
      <button class="btn" id="minify">Minifier</button>
      <button class="btn" id="copy">Copier</button>
      <button class="btn ghost" id="clear">Effacer</button>
    </div>
  </div>

  <div class="io">
    <div class="field"><label for="in">Entrée</label>
      <textarea id="in" spellcheck="false" placeholder='{"exemple": true, "valeurs": [1, 2, 3]}'></textarea>
    </div>
    <div class="field"><label for="out">Résultat</label>
      <textarea id="out" spellcheck="false" readonly placeholder="Le JSON formaté apparaît ici…"></textarea>
    </div>
  </div>
  <div class="status" id="status" role="status" aria-live="polite"></div>

  <footer class="foot"><span class="pt"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Traitement 100% local</span></footer>
</div>
<script>
(function () {
  "use strict";
  var $ = function (id) { return document.getElementById(id); };
  var inEl = $('in'), outEl = $('out'), statusEl = $('status');

  function indentValue() { var v = $('indent').value; return v === 'tab' ? '\t' : (+v); }
  function setStatus(msg, error) { statusEl.textContent = msg; statusEl.className = 'status ' + (error ? 'error' : 'valid'); }

  // Localise approximativement la ligne/colonne d'une erreur de parsing.
  function locate(text, e) {
    var m = /position (\d+)/.exec(e.message);
    if (!m) return '';
    var pos = +m[1], line = 1, col = 1;
    for (var i = 0; i < pos && i < text.length; i++) { if (text[i] === '\n') { line++; col = 1; } else col++; }
    return ' (ligne ' + line + ', colonne ' + col + ')';
  }

  function parse() {
    var src = inEl.value.trim();
    if (!src) { outEl.value = ''; setStatus(''); return null; }
    try { var obj = JSON.parse(src); setStatus('JSON valide.'); return obj; }
    catch (e) { setStatus('JSON invalide : ' + e.message.replace(/^JSON\.parse: /, '') + locate(src, e), true); return undefined; }
  }

  function format() { var o = parse(); if (o === undefined) return; if (o === null) return; outEl.value = JSON.stringify(o, null, indentValue()); }
  function minify() { var o = parse(); if (o === undefined) return; if (o === null) return; outEl.value = JSON.stringify(o); }

  $('format').addEventListener('click', format);
  $('minify').addEventListener('click', minify);
  $('indent').addEventListener('change', function () { if (outEl.value) format(); });
  $('clear').addEventListener('click', function () { inEl.value = ''; outEl.value = ''; setStatus(''); inEl.focus(); });
  $('copy').addEventListener('click', function () {
    var t = outEl.value || inEl.value; if (!t) return;
    navigator.clipboard.writeText(t).then(function () { var b = $('copy'); var o = b.textContent; b.textContent = 'Copié ✓'; setTimeout(function () { b.textContent = o; }, 1200); });
  });
  inEl.addEventListener('input', function () { if (inEl.value.trim()) parse(); else setStatus(''); });
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF en images</title>
<link rel="stylesheet" href="./theme.css">
<link rel="stylesheet" href="./tool.css">
<style>
  .pages{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-top:18px}
  .pg{border:1px solid var(--line);border-radius:var(--radius);background:var(--surface);overflow:hidden;display:flex;flex-direction:column}
  .pg .thumb{background:var(--surface-2);display:flex;align-items:center;justify-content:center;padding:8px;min-height:140px}
  .pg .thumb img{max-width:100%;max-height:200px;box-shadow:var(--shadow-soft)}
  .pg .bar{display:flex;align-items:center;gap:8px;padding:8px 10px;border-top:1px solid var(--line)}
  .pg .num{font-size:12px;color:var(--muted);font-family:var(--font-mono);margin-right:auto}
</style>
</head>
<body>
<div class="wrap">
  <header class="tool-head">
    <div class="tool-mark"><span class="glyph" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><circle cx="9" cy="13" r="1.4"/><path d="m18 19-3-3-6 4"/></svg></span>PDF en images</div>
    <span class="tag">→ PNG · JPG</span>
  </header>
  <p class="sub">Convertissez chaque page d'un PDF en image. Choisissez le format et la résolution, puis téléchargez page par page ou tout d'un coup. Rendu local (pdf.js).</p>

  <div class="drop" id="drop" tabindex="0" role="button" aria-label="Choisir un PDF">
    <div class="bigicon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg></div>
    <h2>Glissez un PDF ici</h2><p>ou cliquez pour le sélectionner</p>
  </div>
  <input type="file" id="file" accept="application/pdf,.pdf" hidden>

  <div id="panel" hidden>
    <div class="toolbar">
      <div class="field" style="min-width:110px"><label for="fmt">Format</label><select id="fmt"><option value="image/png">PNG</option><option value="image/jpeg">JPEG</option></select></div>
      <div class="field" style="min-width:120px"><label for="scale">Résolution</label><select id="scale"><option value="1">1× (écran)</option><option value="2" selected>2× (net)</option><option value="3">3× (impression)</option></select></div>
      <div class="row" style="margin-left:auto;align-self:flex-end"><button class="btn primary" id="dlAll">Tout télécharger</button><button class="btn ghost" id="reset">Autre PDF</button></div>
    </div>
    <div class="pages" id="pages"></div>
  </div>
  <div class="toast" id="toast" role="status"></div>
  <footer class="foot"><span class="pt"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Traitement 100% local</span></footer>
</div>
<script>
(function () {
  "use strict";
  var $ = function (id) { return document.getElementById(id); };
  var SRC = { pdfjs: "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js", worker: "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js" }, libP = null;
  function lib() { if (window.pdfjsLib) return Promise.resolve(window.pdfjsLib); if (libP) return libP; libP = new Promise(function (res, rej) { var s = document.createElement('script'); s.src = SRC.pdfjs; s.onload = function () { window.pdfjsLib.GlobalWorkerOptions.workerSrc = SRC.worker; res(window.pdfjsLib); }; s.onerror = function () { libP = null; rej(new Error('Échec du chargement de pdf.js.')); }; document.head.appendChild(s); }); return libP; }
  var doc = null, fileName = 'page';
  function toast(m, w) { $('toast').className = 'toast show' + (w ? ' warn' : ''); $('toast').innerHTML = m; }
  function hideToast() { $('toast').className = 'toast'; }

  function renderTo(n, scale) {
    return doc.getPage(n).then(function (page) {
      var vp = page.getViewport({ scale: scale }), cv = document.createElement('canvas'); cv.width = vp.width; cv.height = vp.height;
      var ctx = cv.getContext('2d');
      if ($('fmt').value === 'image/jpeg') { ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, cv.width, cv.height); }
      return page.render({ canvasContext: ctx, viewport: vp }).promise.then(function () { return cv; });
    });
  }

  function open(file) {
    if (!file || file.type !== 'application/pdf' && !/\.pdf$/i.test(file.name)) { toast('<span class="lead">Erreur</span> ce fichier n\'est pas un PDF.', true); return; }
    fileName = file.name.replace(/\.pdf$/i, ''); toast('<span class="lead">Lecture</span> rendu des pages…');
    file.arrayBuffer().then(function (ab) { return lib().then(function (p) { return p.getDocument({ data: new Uint8Array(ab) }).promise; }); }).then(function (d) {
      doc = d; $('panel').hidden = false; $('drop').hidden = true; $('pages').innerHTML = '';
      var chain = Promise.resolve();
      for (var i = 1; i <= d.numPages; i++) (function (n) { chain = chain.then(function () { return renderTo(n, 0.5); }).then(function (cv) { addCard(n, cv.toDataURL('image/png')); }); })(i);
      chain.then(hideToast);
    }).catch(function () { toast('<span class="lead">Erreur</span> PDF illisible ou protégé.', true); });
  }

  function addCard(n, thumb) {
    var el = document.createElement('div'); el.className = 'pg';
    el.innerHTML = '<div class="thumb"><img alt="page ' + n + '" src="' + thumb + '"></div><div class="bar"><span class="num">Page ' + n + '</span><button class="btn">Télécharger</button></div>';
    el.querySelector('button').addEventListener('click', function () { downloadPage(n, this); });
    $('pages').appendChild(el);
  }

  function downloadPage(n, btn) {
    var fmt = $('fmt').value, scale = +$('scale').value, ext = fmt === 'image/jpeg' ? 'jpg' : 'png';
    if (btn) { btn.disabled = true; }
    return renderTo(n, scale).then(function (cv) {
      return new Promise(function (res) { cv.toBlob(function (b) { var u = URL.createObjectURL(b), a = document.createElement('a'); a.href = u; a.download = fileName + '-p' + n + '.' + ext; document.body.appendChild(a); a.click(); a.remove(); setTimeout(function () { URL.revokeObjectURL(u); res(); }, 200); }, fmt, 0.92); });
    }).then(function () { if (btn) btn.disabled = false; });
  }

  $('dlAll').addEventListener('click', function () { if (!doc) return; var i = 1; (function next() { if (i > doc.numPages) return; downloadPage(i++).then(function () { setTimeout(next, 150); }); })(); });
  $('reset').addEventListener('click', function () { doc = null; $('panel').hidden = true; $('drop').hidden = false; hideToast(); });
  $('drop').addEventListener('click', function () { $('file').click(); });
  $('drop').addEventListener('keydown', function (e) { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); $('file').click(); } });
  $('file').addEventListener('change', function () { if ($('file').files[0]) open($('file').files[0]); $('file').value = ''; });
  ['dragenter', 'dragover'].forEach(function (ev) { $('drop').addEventListener(ev, function (e) { e.preventDefault(); $('drop').classList.add('hot'); }); });
  ['dragleave', 'dragend', 'drop'].forEach(function (ev) { $('drop').addEventListener(ev, function (e) { e.preventDefault(); $('drop').classList.remove('hot'); }); });
  $('drop').addEventListener('drop', function (e) { if (e.dataTransfer.files[0]) open(e.dataTransfer.files[0]); });
  window.addEventListener('dragover', function (e) { if ($('drop').hidden || !$('drop').contains(e.target)) e.preventDefault(); });
  window.addEventListener('drop', function (e) { if ($('drop').hidden || !$('drop').contains(e.target)) e.preventDefault(); });
})();
</script>
</body>
</html>
